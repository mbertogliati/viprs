[package]
name = "viprs-ops-composite"
version = "0.1.0"
edition = "2024"
rust-version = "1.92"
publish = false

[lints]
workspace = true

[dependencies]
viprs-core = { path = "../viprs-core" }
viprs-ops-pixel = { path = "../viprs-ops-pixel" }
viprs-ops-spatial = { path = "../viprs-ops-spatial" }
bytemuck = { version = "1", features = ["derive", "extern_crate_alloc"] }
rustfft = { version = "6", optional = true }

[dev-dependencies]
proptest = "1"
viprs-ports = { path = "../viprs-ports" }
viprs-runtime = { path = "../viprs-runtime" }

[features]
_integration = []
fft = ["dep:rustfft"]

[package]
name = "viprs-ops-spatial"
version = "0.1.0"
edition = "2024"
rust-version = "1.92"
publish = false

[lints]
workspace = true

[dependencies]
viprs-core = { path = "../viprs-core" }
bytemuck = { version = "1", features = ["derive", "extern_crate_alloc"] }
pulp = { version = "0.22.2", optional = true, default-features = false, features = ["std", "x86-v3"] }

[dev-dependencies]
proptest = "1"
viprs-runtime = { path = "../viprs-runtime" }
viprs-ports = { path = "../viprs-ports" }
viprs-ops-composite = { path = "../viprs-ops-composite" }

[features]
_integration = []
simd-pulp = ["dep:pulp"]

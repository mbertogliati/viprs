name: CI

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # All features EXCEPT jxl (requires libjxl ≥0.11 not yet in the container image).
  # Once the OCI image is rebuilt with libjxl, change to --all-features.
  # Tracked by: PR #12 (ci/libjxl container rebuild)
  CI_FEATURES: "--features default,jpeg,png,webp,tiff,gif,exr,icc,heif,avif,svg,fft,simd-pulp,jp2k,bmp,radiance,pfm,nifti,pnm,openslide,mat-hdf5,uhdr,deepzoom,dcraw,csv,vips-format,tracing,ffi,lock_instrumentation"

permissions:
  packages: write

jobs:
  # ─── Fast checks (fmt doesn't need system libs) ────────────────────────
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.96.0"
          components: rustfmt
      - run: make fmt

  # ─── Core validation (uses Makefile inside container) ──────────────────
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    container: ghcr.io/${{ github.repository_owner }}/viprs-perf:latest
    steps:
      - name: Install build tools
        run: apt-get update -qq && apt-get install -y --no-install-recommends build-essential pkg-config cmake make
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.96.0"
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: make clippy FEATURES="${{ env.CI_FEATURES }}"

  check:
    name: Compile check
    needs: [fmt, clippy]
    if: "!github.event.pull_request.draft"
    runs-on: ubuntu-latest
    container: ghcr.io/${{ github.repository_owner }}/viprs-perf:latest
    steps:
      - name: Install build tools
        run: apt-get update -qq && apt-get install -y --no-install-recommends build-essential pkg-config cmake make
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.96.0"
      - uses: Swatinem/rust-cache@v2
      - run: make build FEATURES="${{ env.CI_FEATURES }}"

  test:
    name: Test
    needs: [fmt, clippy]
    if: "!github.event.pull_request.draft"
    runs-on: ubuntu-latest
    container: ghcr.io/${{ github.repository_owner }}/viprs-perf:latest
    steps:
      - name: Install build tools
        run: apt-get update -qq && apt-get install -y --no-install-recommends build-essential pkg-config cmake make
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.96.0"
      - uses: Swatinem/rust-cache@v2
      - run: make test FEATURES="${{ env.CI_FEATURES }}"

  docs:
    name: Documentation
    needs: [fmt, clippy]
    if: "!github.event.pull_request.draft"
    runs-on: ubuntu-latest
    container: ghcr.io/${{ github.repository_owner }}/viprs-perf:latest
    steps:
      - name: Install build tools
        run: apt-get update -qq && apt-get install -y --no-install-recommends build-essential pkg-config cmake make
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.96.0"
      - uses: Swatinem/rust-cache@v2
      - run: make doc FEATURES="${{ env.CI_FEATURES }}"

  # ─── Security & licensing (specialized actions, no Makefile) ───────────
  audit:
    name: Security Audit
    if: "!github.event.pull_request.draft"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  deny:
    name: Cargo Deny (licenses & advisories)
    if: "!github.event.pull_request.draft"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        env:
          RUSTUP_TOOLCHAIN: stable

  # ─── Xtask build (for benchmark image) ────────────────────────────────
  build-xtask:
    name: Build xtask
    if: "!github.event.pull_request.draft"
    runs-on: ubuntu-latest
    container: ghcr.io/${{ github.repository_owner }}/viprs-perf:latest
    steps:
      - name: Install build tools
        run: apt-get update -qq && apt-get install -y --no-install-recommends build-essential pkg-config cmake make
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.96.0"
      - run: make xtask
      - uses: actions/upload-artifact@v4
        with:
          name: xtask
          path: target/release/xtask

  # ─── Post-validation jobs ──────────────────────────────────────────────
  coverage:
    name: Coverage (≥90%)
    needs: [check, test]
    if: "!github.event.pull_request.draft"
    runs-on: ubuntu-latest
    container: ghcr.io/${{ github.repository_owner }}/viprs-perf:latest
    steps:
      - name: Install build tools
        run: apt-get update -qq && apt-get install -y --no-install-recommends build-essential pkg-config cmake make
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.96.0"
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-llvm-cov
      - run: make coverage FEATURES="${{ env.CI_FEATURES }}"

  benchmarks:
    name: Benchmarks (${{ matrix.arch }})
    needs: [check, test]
    if: "!github.event.pull_request.draft"
    runs-on: ${{ matrix.runner }}
    container: ghcr.io/${{ github.repository_owner }}/viprs-perf:latest
    strategy:
      matrix:
        include:
          - arch: arm64
            runner: ubuntu-24.04-arm
          - arch: x86_64
            runner: ubuntu-latest
    steps:
      - name: Install build tools
        run: apt-get update -qq && apt-get install -y --no-install-recommends build-essential pkg-config cmake make
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.96.0"
      - uses: Swatinem/rust-cache@v2
      - run: make bench FEATURES="${{ env.CI_FEATURES }}"

  repackage-and-publish:
    name: Repackage image with xtask
    needs: [build-xtask]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: xtask
          path: ./xtask-artifact
      - name: Create Dockerfile for repack
        run: |
          cat > Dockerfile.repack <<'DOCKERFILE'
          FROM ghcr.io/${{ github.repository_owner }}/viprs-perf:latest
          COPY xtask-artifact/xtask /usr/local/bin/xtask
          RUN chmod +x /usr/local/bin/xtask
          DOCKERFILE
      - uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v4
        with:
          context: .
          file: Dockerfile.repack
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/viprs-perf:built-${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/viprs-perf:latest-built

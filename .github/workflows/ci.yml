name: CI

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]
  merge_group:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # Features for containerless CI jobs (no native C libraries needed).
  RUST_FEATURES: "--features default,simd-pulp"
  # Keep this in sync with Makefile CONTAINER_FEATURES so clippy checks every
  # feature-gated module compiled in container CI.
  CLIPPY_FEATURES: "--features default,simd-pulp,rayon,jpeg,png,webp,tiff,heif,avif,gif,jp2k,fft,exr,lock_instrumentation"
  # Source-built libs live in /usr/local/lib (container jobs only)
  PKG_CONFIG_PATH: /usr/local/lib/pkgconfig
  # Common container build tools — avoids duplicating the apt-get list in every job.
  CONTAINER_BUILD_DEPS: "build-essential pkg-config cmake make nasm git git-lfs libclang-dev"

permissions:
  contents: read

jobs:
  # ═══ Layer 1: fast checks — all run in parallel, no deps ═════════════════════

  lint:
    name: "Lint (fmt + clippy)"
    if: "!github.event.pull_request.draft"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    container: ghcr.io/${{ github.repository_owner }}/viprs-perf:latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.96.0"
          components: rustfmt, clippy
      - name: Install nasm (needed by rav1e for AVIF)
        run: apt-get update -qq && apt-get install -y --no-install-recommends nasm
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "lint"
      - name: Check formatting
        run: make fmt
      - name: Clippy
        run: make clippy FEATURES="${{ env.CLIPPY_FEATURES }}"
      - name: Build docs (deny warnings)
        run: make doc FEATURES="${{ env.CLIPPY_FEATURES }}"

  security:
    name: "Security (audit + deny)"
    if: "!github.event.pull_request.draft"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: EmbarkStudios/cargo-deny-action@v2
        env:
          RUSTUP_TOOLCHAIN: stable

  # ═══ Layer 2: tests + coverage in a single instrumented pass ═════════════════
  # Replaces the old test-all → coverage chain (two full compilations from zero).
  # cargo llvm-cov with --doctests runs lib + integration + doc tests in one go
  # and produces coverage data. One compilation, one execution, two results.

  test-unit:
    name: "Unit tests (no codecs)"
    needs: [lint]
    if: "!github.event.pull_request.draft"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: ./.github/actions/setup-toolchain
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "test-unit"
      - name: Run unit tests
        run: make test FEATURES="${{ env.RUST_FEATURES }}"

  test-and-coverage:
    name: "Tests + Coverage (all codecs, ≥86%)"
    needs: [lint, test-unit]
    if: "!github.event.pull_request.draft"
    runs-on: ubuntu-latest
    timeout-minutes: 25
    container: ghcr.io/${{ github.repository_owner }}/viprs-perf:latest
    steps:
      - name: Install build tools
        run: apt-get update -qq && apt-get install -y --no-install-recommends ${{ env.CONTAINER_BUILD_DEPS }}
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.96.0"
          components: llvm-tools-preview
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "test-coverage"
      - name: Run all tests with coverage instrumentation
        run: make coverage
      - name: Generate summary
        if: always()
        run: |
          echo "## Tests + Coverage" >> $GITHUB_STEP_SUMMARY
          echo "Ran: unit + integration + doc tests (all codecs)" >> $GITHUB_STEP_SUMMARY
          echo "Target: ≥90% line coverage on \`ops/\` and \`codecs/\`" >> $GITHUB_STEP_SUMMARY

  # ═══ Layer 3: benchmarks — run in parallel with Layer 2 ══════════════════════

  benchmarks:
    name: "Benchmarks (${{ matrix.arch }})"
    needs: [lint]
    if: "!github.event.pull_request.draft"
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 35
    strategy:
      matrix:
        include:
          - arch: arm64
            runner: ubuntu-24.04-arm
          - arch: x86_64
            runner: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-toolchain
      - name: Install system libs (fft, heif, webp)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libfftw3-dev libheif-dev libwebp-dev pkg-config
      - name: Restore baseline from main
        uses: actions/cache/restore@v4
        with:
          path: target/criterion
          key: criterion-baseline-${{ matrix.arch }}-main
      - name: Run benchmarks
        env:
          BENCH_FEATURES: "--features default,simd-pulp,fft,heif,webp,tiff,png"
        run: ./.github/scripts/bench.sh
      - name: Save baseline (main only)
        if: github.ref == 'refs/heads/main'
        run: make bench-baseline FEATURES="--features default,simd-pulp,fft,heif,webp,tiff,png"
      - name: Cache baseline (main only)
        if: github.ref == 'refs/heads/main'
        uses: actions/cache/save@v4
        with:
          path: target/criterion
          key: criterion-baseline-${{ matrix.arch }}-main

  build-xtask:
    name: "Build benchmark tooling (${{ matrix.arch }})"
    needs: [lint]
    if: "!github.event.pull_request.draft"
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 15
    continue-on-error: true
    container: ghcr.io/${{ github.repository_owner }}/viprs-perf:latest
    strategy:
      matrix:
        include:
          - arch: arm64
            runner: ubuntu-24.04-arm
          - arch: x86_64
            runner: ubuntu-latest
    steps:
      - name: Install build tools
        run: apt-get update -qq && apt-get install -y --no-install-recommends build-essential pkg-config cmake make nasm
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.96.0"
      - name: Build xtask release binary
        run: make xtask
      - uses: actions/upload-artifact@v4
        with:
          name: xtask-${{ matrix.arch }}
          path: target/release/xtask

  bench-vs-libvips:
    name: "Performance: viprs vs libvips (${{ matrix.arch }})"
    needs: [build-xtask]
    if: "!github.event.pull_request.draft"
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 25
    continue-on-error: true
    container: ghcr.io/${{ github.repository_owner }}/viprs-perf:latest
    strategy:
      matrix:
        include:
          - arch: arm64
            runner: ubuntu-24.04-arm
          - arch: x86_64
            runner: ubuntu-latest
    steps:
      - name: Install build tools
        run: apt-get update -qq && apt-get install -y --no-install-recommends build-essential pkg-config cmake make git-lfs libvips-dev nasm jq bc
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.96.0"
      - name: Download pre-built xtask
        uses: actions/download-artifact@v4
        with:
          name: xtask-${{ matrix.arch }}
          path: target/release
      - name: Make xtask executable
        run: chmod +x target/release/xtask
      - name: Verify libvips available
        run: pkg-config --modversion vips || echo "libvips not found in container"
      - name: Build libvips runner
        run: make -C tools/bench-vs-libvips
      - name: Run E2E benchmark suite
        env:
          XTASK_BIN: ./target/release/xtask
        run: ./.github/scripts/bench-vs-libvips.sh
      - name: Check ratios (fail on >1.05)
        run: ./.github/scripts/check-ratios.sh
      - name: Web-service workload simulation
        env:
          XTASK_BIN: ./target/release/xtask
        run: ./.github/scripts/web-bench.sh
      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-vs-libvips-${{ matrix.arch }}
          path: /tmp/bench-results/

  # ═══ Status gate — the ONLY required check in Branch Rules ═══════════════════

  status-gate:
    name: "CI passed"
    needs: [lint, security, test-unit, test-and-coverage, benchmarks, build-xtask, bench-vs-libvips]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Evaluate results
        run: |
          results='${{ toJSON(needs.*.result) }}'
          echo "Job results: $results"
          # Filter out "skipped" (draft PRs) — only fail on failure/cancelled.
          if echo "$results" | grep -qE '"failure"|"cancelled"'; then
            echo "❌ One or more required checks failed." >> $GITHUB_STEP_SUMMARY
            echo "Results: $results" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          echo "✅ All required checks passed." >> $GITHUB_STEP_SUMMARY

  # ═══ Deploy (main only) ══════════════════════════════════════════════════════

  repackage-and-publish:
    name: "Repackage image with xtask"
    needs: [build-xtask, status-gate]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      packages: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: xtask-x86_64
          path: ./xtask-artifact
      - name: Create Dockerfile for repack
        run: |
          cat > Dockerfile.repack <<'DOCKERFILE'
          FROM ghcr.io/${{ github.repository_owner }}/viprs-perf:latest
          COPY xtask-artifact/xtask /usr/local/bin/xtask
          RUN chmod +x /usr/local/bin/xtask
          DOCKERFILE
      - uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v4
        with:
          context: .
          file: Dockerfile.repack
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/viprs-perf:built-${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/viprs-perf:latest-built

name: CI

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

permissions:
  packages: read

jobs:
  # ─── Fast checks (always run, even on drafts) ───────────────────────
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --lib --all-features -- -D clippy::perf -D clippy::unwrap_used -D clippy::expect_used

  # ─── Full checks (only on non-draft PRs, gate on fast checks) ────────
  check:
    name: Check (stable + MSRV)
    needs: [fmt, clippy]
    if: "!github.event.pull_request.draft"
    runs-on: ubuntu-latest
    container: ghcr.io/${{ github.repository_owner }}/viprs-perf:latest
    steps:
    strategy:
      matrix:
        rust: [stable, "1.92"]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --lib --all-features

  test:
    name: Test
    needs: [fmt, clippy]
    if: "!github.event.pull_request.draft"
    runs-on: ubuntu-latest
    container: ghcr.io/${{ github.repository_owner }}/viprs-perf:latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --lib

  docs:
    name: Documentation
    needs: [fmt, clippy]
    if: "!github.event.pull_request.draft"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --no-deps --all-features
        env:
          RUSTDOCFLAGS: -Dwarnings

  audit:
    name: Security Audit
    if: "!github.event.pull_request.draft"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  deny:
    name: Cargo Deny (licenses & advisories)
    if: "!github.event.pull_request.draft"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2

  semver:
    name: Semver Check
    needs: [check]
    if: "!github.event.pull_request.draft"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-semver-checks
        run: cargo install cargo-semver-checks --locked
      - run: cargo semver-checks check-release

  coverage:
    name: Coverage (≥90%)
    needs: [check, test]
    if: "!github.event.pull_request.draft"
    runs-on: ubuntu-latest
    container: ghcr.io/${{ github.repository_owner }}/viprs-perf:latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Run coverage
        run: cargo llvm-cov --lib --ignore-filename-regex '(benches|tests)' --fail-under-lines 90

  benchmarks:
    name: Benchmarks (${{ matrix.arch }})
    needs: [check, test]
    if: "!github.event.pull_request.draft"
    runs-on: ${{ matrix.runner }}
    container: ghcr.io/${{ github.repository_owner }}/viprs-perf:latest
    strategy:
      matrix:
        include:
          - arch: arm64
            runner: ubuntu-24.04-arm
          - arch: x86_64
            runner: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install critcmp
        run: cargo install critcmp --locked
      - name: Bench target branch (${{ github.base_ref }})
        run: |
          git checkout ${{ github.base_ref }}
          cargo bench --bench '*' -- --save-baseline base 2>/dev/null || true
      - name: Bench PR
        run: |
          git checkout ${{ github.sha }}
          cargo bench --bench '*' -- --save-baseline pr
      - name: Compare (fail on >5% regression)
        run: critcmp base pr --threshold 5

name: Build and publish OCI image

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      image:
        description: "Image to build"
        required: true
        default: "ci"
        type: choice
        options:
          - ci
          - perf
          - all

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build-push:
    name: Build and push multi-arch image to GHCR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        if: github.event_name != 'workflow_dispatch' || inputs.image == 'perf' || inputs.image == 'all'
        uses: docker/build-push-action@v4
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/viprs-perf:latest
            ghcr.io/${{ github.repository_owner }}/viprs-perf:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Read Rust version from rust-toolchain.toml
        id: rust-version
        run: echo "version=$(grep '^channel' rust-toolchain.toml | cut -d'"' -f2)" >> "$GITHUB_OUTPUT"

      - name: Build and push CI image
        if: github.event_name != 'workflow_dispatch' || inputs.image == 'ci' || inputs.image == 'all'
        uses: docker/build-push-action@v4
        with:
          context: docker/
          file: docker/Dockerfile.ci
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            BASE_IMAGE=rust:${{ steps.rust-version.outputs.version }}-trixie
            RUST_VERSION=${{ steps.rust-version.outputs.version }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/viprs-ci:latest
            ghcr.io/${{ github.repository_owner }}/viprs-ci:${{ github.sha }}
          cache-from: type=gha,scope=ci-image
          cache-to: type=gha,mode=max,scope=ci-image

      - name: Image info
        run: |
          echo "Images published:"
          if [ "${{ github.event_name }}" != "workflow_dispatch" ] || [ "${{ inputs.image }}" = "perf" ] || [ "${{ inputs.image }}" = "all" ]; then
            echo "  ghcr.io/${{ github.repository_owner }}/viprs-perf:latest"
          fi
          if [ "${{ github.event_name }}" != "workflow_dispatch" ] || [ "${{ inputs.image }}" = "ci" ] || [ "${{ inputs.image }}" = "all" ]; then
            echo "  ghcr.io/${{ github.repository_owner }}/viprs-ci:latest"
          fi

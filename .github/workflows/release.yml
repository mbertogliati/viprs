name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: rust

  publish:
    name: Publish to crates.io
    needs: [release-please]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    environment: crates-io
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Publish viprs-core
        run: cargo publish -p viprs-core
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Wait for crates.io index after viprs-core
        run: sleep 30
      - name: Publish viprs-ports
        run: cargo publish -p viprs-ports
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Wait for crates.io index after viprs-ports
        run: sleep 30
      - name: Publish viprs-ops-pixel
        run: cargo publish -p viprs-ops-pixel
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Wait for crates.io index after viprs-ops-pixel
        run: sleep 30
      - name: Publish viprs-ops-spatial
        run: cargo publish -p viprs-ops-spatial
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Wait for crates.io index after viprs-ops-spatial
        run: sleep 30
      - name: Publish viprs-ops-colour
        run: cargo publish -p viprs-ops-colour
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Wait for crates.io index after viprs-ops-colour
        run: sleep 30
      - name: Publish viprs-ops-composite
        run: cargo publish -p viprs-ops-composite
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Wait for crates.io index after viprs-ops-composite
        run: sleep 30
      - name: Publish viprs-codecs
        run: cargo publish -p viprs-codecs
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Wait for crates.io index after viprs-codecs
        run: sleep 30
      - name: Publish viprs-runtime
        run: cargo publish -p viprs-runtime
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Wait for crates.io index after viprs-runtime
        run: sleep 30
      - name: Publish viprs
        run: cargo publish -p viprs
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

---
name: Bug Report
description: Report incorrect behavior or a crash
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: Minimal code or commands to reproduce the issue
      render: rust
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: viprs version
      placeholder: "0.1.0"
    validations:
      required: true
  - type: input
    id: rust-version
    attributes:
      label: Rust version (rustc --version)
      placeholder: "rustc 1.92.0"
  - type: input
    id: os
    attributes:
      label: OS / Architecture
      placeholder: "macOS arm64 / Ubuntu x86_64"

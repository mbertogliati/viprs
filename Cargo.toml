[workspace]
members = [".", "xtask", "crates/viprs-core", "crates/viprs-ports", "crates/viprs-ops-pixel", "crates/viprs-ops-spatial", "crates/viprs-ops-colour", "crates/viprs-ops-composite", "crates/viprs-codecs", "crates/viprs-runtime"]
resolver = "3"

[workspace.package]
rust-version = "1.92"

[package]
name = "viprs"
version = "0.1.0"
edition = "2024"
rust-version.workspace = true
description = "Native Rust reimplementation of libvips focused on demand-driven, horizontally-threaded image processing."
license = "MIT"
repository = "https://github.com/mbertogliati/viprs"
readme = "README.md"
autobenches = false
keywords = ["image-processing", "vips", "jpeg", "thumbnail", "pipeline"]
categories = ["multimedia::images", "algorithms"]
exclude = [
    "tests/fixtures/**",
    ".libvips_repo/**",
    "target/**",
    ".github/**",
    "docker/**",
    "tools/**",
    "xtask/**",
]

[lib]
crate-type = ["rlib", "cdylib"]

[lints]
workspace = true

[workspace.lints.clippy]
# Safety & correctness
unwrap_used = "deny"
expect_used = "deny"
panic = "deny"
unreachable = "deny"

# Public API quality
missing_panics_doc = "deny"

# Performance
perf = { level = "deny", priority = -1 }

# Pedantic (high bar for public lib) — BLOCKING
pedantic = { level = "deny", priority = -1 }

# Nursery (experimental but useful) — BLOCKING
nursery = { level = "deny", priority = -1 }

# Pedantic overrides (too noisy or conflicts with project style)
module_name_repetitions = "allow"
cast_possible_truncation = "allow"
cast_sign_loss = "allow"
cast_precision_loss = "allow"
cast_lossless = "allow"
cast_possible_wrap = "allow"
missing_errors_doc = "allow"
inline_always = "allow"
too_many_arguments = "allow"
too_many_lines = "allow"
float_cmp = "allow"
many_single_char_names = "allow"
similar_names = "allow"

[workspace.lints.rust]
missing_docs = "deny"

[dependencies]
viprs-core = { path = "crates/viprs-core" }
viprs-ports = { path = "crates/viprs-ports" }
viprs-ops-pixel = { path = "crates/viprs-ops-pixel" }
viprs-ops-spatial = { path = "crates/viprs-ops-spatial" }
viprs-ops-colour = { path = "crates/viprs-ops-colour" }
viprs-ops-composite = { path = "crates/viprs-ops-composite" }
viprs-codecs = { path = "crates/viprs-codecs", default-features = false }
viprs-runtime = { path = "crates/viprs-runtime", default-features = false }
thiserror = "2"
bytemuck = { version = "1", features = ["derive", "extern_crate_alloc"] }
ab_glyph = "0.2"
crossbeam-channel = "0.5"
rayon = { version = "1", optional = true }
tracing = { version = "0.1", optional = true }
memmap2 = { version = "0.9", optional = true }
rustfft = { version = "6", optional = true }
pulp = { version = "0.22.2", optional = true, default-features = false, features = ["std", "x86-v3"] }
png = { version = "0.17", optional = true }

[dev-dependencies]
proptest = "1"
criterion = { version = "0.5", features = ["html_reports"] }
iai-callgrind = "0.16"
dhat = "0.3"
libc = "0.2"
crc32fast = "1"

[features]
# Default runtime features: rayon scheduler, mmap-backed sources, and SIMD dispatch.
default = ["rayon", "mmap", "simd-pulp"]
ffi = []
lock_instrumentation = []
rayon = ["dep:rayon", "viprs-codecs/rayon", "viprs-runtime/rayon"]
tracing = ["dep:tracing", "viprs-codecs/tracing", "viprs-runtime/tracing"]
mmap = ["dep:memmap2", "viprs-codecs/mmap", "viprs-runtime/mmap"]
# Optional compute/color features.
fft = ["dep:rustfft", "viprs-ops-composite/fft", "viprs-runtime/fft"]
# Native codec flags intentionally keep the C-backed implementations for throughput.
# See README.md for per-OS install commands and feature-specific system dependencies.
jpeg = ["viprs-codecs/jpeg", "viprs-runtime/jpeg", "icc"]
bmp = ["viprs-codecs/bmp", "viprs-runtime/bmp"]
png = ["viprs-codecs/png", "viprs-runtime/png", "icc", "dep:png"]
libspng = ["png", "viprs-codecs/libspng", "viprs-runtime/libspng"]
webp = ["viprs-codecs/webp", "viprs-runtime/webp", "icc"] # C-backed libwebp path used for encode/decode.
tiff = ["viprs-codecs/tiff", "viprs-runtime/tiff"]
gif = ["viprs-codecs/gif", "viprs-runtime/gif"]
exr = ["viprs-codecs/exr", "viprs-runtime/exr"]
radiance = ["viprs-codecs/radiance", "viprs-runtime/radiance"]
pfm = ["viprs-codecs/pfm", "viprs-runtime/pfm"]
avif = ["viprs-codecs/avif", "viprs-runtime/avif"] # Requires libheif.
heif = ["viprs-codecs/heif", "viprs-runtime/heif"] # Requires libheif.
simd-pulp = ["dep:pulp", "viprs-ops-spatial/simd-pulp", "viprs-runtime/simd-pulp"]
svg = ["viprs-codecs/svg", "viprs-runtime/svg"]
jxl = ["viprs-codecs/jxl", "viprs-runtime/jxl"]
icc = ["viprs-codecs/icc", "viprs-ops-colour/icc", "viprs-runtime/icc"] # Requires lcms2.
fits = ["viprs-codecs/fits", "viprs-runtime/fits"]
mat-hdf5 = ["viprs-codecs/mat-hdf5", "viprs-runtime/mat-hdf5"]
magick = ["viprs-codecs/magick", "viprs-runtime/magick"]
pdf-poppler = ["viprs-codecs/pdf-poppler", "viprs-runtime/pdf-poppler"]
jp2k = ["viprs-codecs/jp2k", "viprs-runtime/jp2k"] # Requires OpenJPEG when using system toolchains.
openslide = ["viprs-codecs/openslide", "viprs-runtime/openslide"] # Requires OpenSlide.
uhdr = ["viprs-codecs/uhdr", "viprs-runtime/uhdr", "jpeg"]
deepzoom = ["viprs-codecs/deepzoom", "viprs-runtime/deepzoom"]
dcraw = ["viprs-codecs/dcraw", "viprs-runtime/dcraw"]
csv = ["viprs-codecs/csv", "viprs-runtime/csv"]
vips-format = ["viprs-codecs/vips-format", "viprs-runtime/vips-format"]
nifti = ["viprs-codecs/nifti", "viprs-runtime/nifti"]
pnm = ["viprs-codecs/pnm", "viprs-runtime/pnm"]


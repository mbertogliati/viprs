# ---------------------------------------------------------------------------
# Production-grade compiler profiles
# All benchmarks run under `cargo bench` (inherits release) or `cargo xtask bench`
# (also release). Both must match what ships in production: fat LTO, native CPU,
# single codegen unit so LLVM can cross-crate inline and vectorize everything.
# ---------------------------------------------------------------------------

[profile.release]
opt-level = 3           # maximum optimisation
lto = "fat"             # cross-crate inlining + dead code elimination
codegen-units = 1       # single CGU: lets LLVM see the whole program at once
panic = "abort"         # no unwinding machinery in the pixel path
strip = "none"          # keep symbols for profiling (flamegraph / instruments)
debug = 1              # line tables for samply/instruments (no full DWARF bloat)

[profile.bench]
inherits = "release"    # criterion runs under `bench`; must match release flags


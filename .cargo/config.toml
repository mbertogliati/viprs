[alias]
xtask = "run --package xtask --release --"
cov-lib = "llvm-cov --lib --ignore-filename-regex (benches|tests)"
cov-lib-fft = "llvm-cov --lib --features fft --ignore-filename-regex (benches|tests)"

[build]
# Generate code for the exact CPU running the build — enables NEON on Apple Silicon,
# AVX2/AVX-512 on Intel/AMD. Must match the C runner's -march=native so both sides
# use the same SIMD instruction set in benchmarks.
rustflags = ["-C", "target-cpu=native"]

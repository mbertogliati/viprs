[advisories]
ignore = [
    # Transitive deps flagged as unmaintained — tracked for replacement.
    "RUSTSEC-2024-0376",  # paste
    "RUSTSEC-2024-0423",  # proc-macro-error2
    "RUSTSEC-2025-0025",  # bincode
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "IJG",
    "NCSA",
    "Unicode-3.0",
    "Zlib",
    "BSL-1.0",
]
exceptions = [
    # JPEG XL crates are GPL-3.0 but gated behind the optional `jxl` feature.
    { allow = ["GPL-3.0-or-later"], crate = "jpegxl-rs" },
    { allow = ["GPL-3.0-or-later"], crate = "jpegxl-sys" },
]

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
